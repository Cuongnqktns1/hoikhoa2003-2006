<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hội Khóa 2003-2006 - THPT 1/5 Nghĩa Đàn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phuong-vi-top"></div>

    <div class="container">
        <div class="header-logo">
            <h2>BAN LIÊN LẠC HỘI KHÓA 2003-2006</h2>
            <h3>Trường THPT 1/5 Nghĩa Đàn</h3>
        </div>
        
        <form id="registrationForm" action="DÁN_LINK_WEB_APP_URL_CỦA_ANH_VÀO_ĐÂY" method="POST">
            <p class="sub-title">Vui lòng điền thông tin để Ban Liên Lạc chuẩn bị áo và hậu cần chu đáo nhất.</p>
            <hr>

            <div class="input-group">
                <label>Họ và Tên</label>
                <input type="text" name="fullname" placeholder="VD: Nguyễn Văn A" required>
            </div>

            <div class="input-group">
                <label>Lớp (Khóa 2003-2006)</label>
                <input type="text" name="class" placeholder="VD: 12A hoặc 12B" required>
            </div>

            <div class="input-group">
                <label>Số điện thoại (Zalo)</label>
                <input type="tel" name="phone" placeholder="Để BLL tiện liên lạc" required>
            </div>

            <div class="input-group">
                <label>Địa chỉ hiện tại</label>
                <input type="text" name="address" placeholder="Nơi bạn đang sinh sống" required>
            </div>

            <div class="input-group">
                <label>Size áo hội khóa</label>
                <select name="size" required>
                    <option value="">-- Chọn size áo --</option>
                    <option value="S">Size S</option>
                    <option value="M">Size M</option>
                    <option value="L">Size L</option>
                    <option value="XL">Size XL</option>
                    <option value="XXL">Size XXL</option>
                    <option value="3XL">Size 3XL (Ngoại cỡ)</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">Gửi thông tin đăng ký</button>
        </form>

        <div class="phuong-vi-bottom"></div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Đang gửi dữ liệu...";

            fetch(form.action, { method: 'POST', body: new FormData(form) })
            .then(response => {
                // Lời nhắn theo đúng yêu cầu của anh
                alert('Bạn đã hoàn thành đăng ký thông tin.\nHẹn gặp lại bạn vào ngày hội khóa 26 và 27 tháng 6 năm 2026!');
                form.reset();
                btn.disabled = false;
                btn.innerText = "Gửi thông tin đăng ký";
            })
            .catch(error => {
                alert('Có lỗi xảy ra, bạn vui lòng thử lại nhé!');
                btn.disabled = false;
                btn.innerText = "Gửi thông tin đăng ký";
            });
        });
    </script>
</body>
</html>
