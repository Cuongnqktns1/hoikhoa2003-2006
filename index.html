<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hội Khóa 2003-2006 - THPT 1/5 Nghĩa Đàn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="canh-phuong top-right"></div>
    <div class="canh-phuong bottom-left"></div>

    <div class="container" id="mainContainer">
        <div id="formSection">
            <div class="header-logo">
                <h2>BAN LIÊN LẠC HỘI KHÓA 2003-2006</h2>
                <h3>Trường THPT 1/5 Nghĩa Đàn</h3>
            </div>
            
            <form id="registrationForm" action="https://script.google.com/macros/s/AKfycbw7hdsAtlHmn3Hi2btdP5cUtJ1wHHpT-2JfxYvWhxXpCk789Nuo3SrfsH7RxaXZMI2F/exec" method="POST">
                <p class="sub-title">Vui lòng điền thông tin để Ban Liên Lạc chuẩn bị áo và hậu cần chu đáo nhất.</p>
                <hr>

                <div class="input-group">
                    <label>Họ và Tên</label>
                    <input type="text" name="fullname" placeholder="VD: Nguyễn Văn A" required>
                </div>

                <div class="input-group">
                    <label>Giới tính</label>
                    <select name="gender" required>
                        <option value="">-- Chọn giới tính --</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Lớp (Khóa 2003-2006)</label>
                    <input type="text" name="class" placeholder="VD: 12A hoặc 12B" required>
                </div>

                <div class="input-group">
                    <label>Số điện thoại (Zalo)</label>
                    <input type="tel" name="phone" placeholder="Để BLL tiện liên lạc" required>
                </div>

                <div class="input-group">
                    <label>Địa chỉ hiện tại (Tỉnh/Thành phố)</label>
                    <select name="address" required>
                        <option value="">-- Chọn Tỉnh/Thành phố --</option>
                        <option value="An Giang">An Giang</option>
                        <option value="Bà Rịa - Vũng Tàu">Bà Rịa - Vũng Tàu</option>
                        <option value="Bắc Giang">Bắc Giang</option>
                        <option value="Bắc Kạn">Bắc Kạn</option>
                        <option value="Bạc Liêu">Bạc Liêu</option>
                        <option value="Bắc Ninh">Bắc Ninh</option>
                        <option value="Bến Tre">Bến Tre</option>
                        <option value="Bình Định">Bình Định</option>
                        <option value="Bình Dương">Bình Dương</option>
                        <option value="Bình Phước">Bình Phước</option>
                        <option value="Bình Thuận">Bình Thuận</option>
                        <option value="Cà Mau">Cà Mau</option>
                        <option value="Cần Thơ">Cần Thơ</option>
                        <option value="Cao Bằng">Cao Bằng</option>
                        <option value="Đà Nẵng">Đà Nẵng</option>
                        <option value="Đắk Lắk">Đắk Lắk</option>
                        <option value="Đắk Nông">Đắk Nông</option>
                        <option value="Điện Biên">Điện Biên</option>
                        <option value="Đồng Nai">Đồng Nai</option>
                        <option value="Đồng Tháp">Đồng Tháp</option>
                        <option value="Gia Lai">Gia Lai</option>
                        <option value="Hà Giang">Hà Giang</option>
                        <option value="Hà Nam">Hà Nam</option>
                        <option value="Hà Nội">Hà Nội</option>
                        <option value="Hà Tĩnh">Hà Tĩnh</option>
                        <option value="Hải Dương">Hải Dương</option>
                        <option value="Hải Phòng">Hải Phòng</option>
                        <option value="Hậu Giang">Hậu Giang</option>
                        <option value="Hòa Bình">Hòa Bình</option>
                        <option value="Hưng Yên">Hưng Yên</option>
                        <option value="Khánh Hòa">Khánh Hòa</option>
                        <option value="Kiên Giang">Kiên Giang</option>
                        <option value="Kon Tum">Kon Tum</option>
                        <option value="Lai Châu">Lai Châu</option>
                        <option value="Lâm Đồng">Lâm Đồng</option>
                        <option value="Lạng Sơn">Lạng Sơn</option>
                        <option value="Lào Cai">Lào Cai</option>
                        <option value="Long An">Long An</option>
                        <option value="Nam Định">Nam Định</option>
                        <option value="Nghệ An">Nghệ An</option>
                        <option value="Ninh Bình">Ninh Bình</option>
                        <option value="Ninh Thuận">Ninh Thuận</option>
                        <option value="Phú Thọ">Phú Thọ</option>
                        <option value="Phú Yên">Phú Yên</option>
                        <option value="Quảng Bình">Quảng Bình</option>
                        <option value="Quảng Nam">Quảng Nam</option>
                        <option value="Quảng Ngãi">Quảng Ngãi</option>
                        <option value="Quảng Ninh">Quảng Ninh</option>
                        <option value="Quảng Trị">Quảng Trị</option>
                        <option value="Sóc Trăng">Sóc Trăng</option>
                        <option value="Sơn La">Sơn La</option>
                        <option value="Tây Ninh">Tây Ninh</option>
                        <option value="Thái Bình">Thái Bình</option>
                        <option value="Thái Nguyên">Thái Nguyên</option>
                        <option value="Thanh Hóa">Thanh Hóa</option>
                        <option value="Thừa Thiên Huế">Thừa Thiên Huế</option>
                        <option value="Tiền Giang">Tiền Giang</option>
                        <option value="TP Hồ Chí Minh">TP Hồ Chí Minh</option>
                        <option value="Trà Vinh">Trà Vinh</option>
                        <option value="Tuyên Quang">Tuyên Quang</option>
                        <option value="Vĩnh Long">Vĩnh Long</option>
                        <option value="Vĩnh Phúc">Vĩnh Phúc</option>
                        <option value="Yên Bái">Yên Bái</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Size áo hội khóa</label>
                    <select name="size" required>
                        <option value="">-- Chọn size áo --</option>
                        <option value="XS">Size S</option>
                        <option value="S">Size S</option>
                        <option value="M">Size M</option>
                        <option value="L">Size L</option>
                        <option value="XL">Size XL</option>
                        <option value="XXL">Size XXL</option>
                        <option value="3XL">Size 3XL</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">Gửi thông tin đăng ký</button>
            </form>
        </div>

        <div id="successSection" style="display: none; text-align: center; padding: 40px 10px;">
            <div class="success-icon">❤️</div>
            <h2 style="color: #d62c2c; margin-top: 20px;">ĐĂNG KÝ THÀNH CÔNG!</h2>
            <p style="font-size: 1.1rem; line-height: 1.6; color: #333;">
                Cảm ơn bạn đã hoàn thành đăng ký thông tin.<br>
                <strong>Hẹn gặp lại bạn vào ngày hội khóa 26 và 27 tháng 6 năm 2026!</strong>
            </p>
            <button onclick="window.location.reload()" class="btn-submit" style="width: auto; padding: 10px 30px; background: #555;">Quay lại</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('registrationForm');
        const btn = document.getElementById('submitBtn');
        const formSection = document.getElementById('formSection');
        const successSection = document.getElementById('successSection');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "Đang gửi dữ liệu...";

            fetch(form.action, { method: 'POST', body: new FormData(form) })
            .then(response => {
                formSection.style.display = 'none';
                successSection.style.display = 'block';
                window.scrollTo(0, 0);
            })
            .catch(error => {
                alert('Có lỗi xảy ra, bạn vui lòng thử lại nhé!');
                btn.disabled = false;
                btn.innerText = "Gửi thông tin đăng ký";
            });
        });
    </script>
</body>
</html>
